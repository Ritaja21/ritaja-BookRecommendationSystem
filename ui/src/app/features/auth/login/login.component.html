<div class="auth-wrap">
  <div class="auth-card">

    <div class="auth-logo">📚 BookRec</div>
    <div class="auth-sub">Sign in to your account</div>

    <div class="form-group">
      <label class="form-label">Email</label>
      <input
        class="form-input"
        type="email"
        placeholder="you@example.com"
        [(ngModel)]="email"
      />
    </div>

    <div class="form-group">
      <label class="form-label">Password</label>
      <input
        class="form-input"
        type="password"
        placeholder="••••••••"
        [(ngModel)]="password"
      />
    </div>

    <div class="error-msg" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>

    <button class="btn btn-primary" (click)="onLogin()">
      Sign In
    </button>

    <div class="auth-footer">
      Don't have an account?
      <a routerLink="/register">Register</a>
    </div>

  </div>
</div>
